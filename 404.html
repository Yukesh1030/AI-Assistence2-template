<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost in the Grid</title>
    <meta name="description" content="The page you are looking for has drifted off the network.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-page-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            position: relative;
            overflow: hidden;
            padding: 24px;
            background-color: var(--bg-page);
        }
        
        #error-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        
        .error-content {
            position: relative;
            z-index: 10;
            max-width: 500px;
            background: rgba(19, 19, 19, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            padding: 48px;
            border-radius: 16px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }
        
        html[data-theme="light"] .error-content {
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 30px 60px rgba(0,0,0,0.05);
        }
        
        .error-title {
            font-size: 6rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent-color), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .error-subtitle {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        .error-desc {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        
        .error-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        
        @media (max-width: 480px) {
            .error-content {
                padding: 32px 20px;
                border-radius: 12px;
            }
            .error-title {
                font-size: 4rem;
            }
            .error-subtitle {
                font-size: 1.2rem;
            }
            .error-actions {
                flex-direction: column;
                gap: 12px;
            }
            .error-actions button, .error-actions a {
                width: 100%;
                display: block;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>
    <div class="error-page-container">
        <!-- Canvas for Robot + Broken Network + Gradient particles -->
        <canvas id="error-canvas"></canvas>
        
        <div class="error-content">
            <div class="error-title">404</div>
            <div class="error-subtitle">Connection Lost</div>
            <p class="error-desc">The request returned a broken grid state. The coordinates you provided have drifted outside our network clusters.</p>
            
            <div class="error-actions">
                <button onclick="window.history.back();" class="btn-hero-secondary" style="cursor: pointer; padding: 12px 24px;">Back</button>
                <a href="index.html" class="btn-hero-primary" style="padding: 12px 24px;">Back to Home</a>
            </div>
        </div>
    </div>
    
    <!-- Canvas Animation Script -->
    <script>
        (function() {
            const canvas = document.getElementById('error-canvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            
            let w = canvas.width = window.innerWidth;
            let h = canvas.height = window.innerHeight;
            
            window.addEventListener('resize', () => {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            });
            
            // Robot coordinates variables
            let robotYOffset = 0;
            let robotYDir = 1;
            
            // Particles and Grid
            const particles = [];
            for (let i = 0; i < 50; i++) {
                particles.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: (Math.random() - 0.5) * 0.4,
                    r: Math.random() * 2 + 1,
                    color: Math.random() < 0.5 ? 'rgba(56, 189, 248, 0.3)' : 'rgba(168, 85, 247, 0.2)'
                });
            }
            
            function draw() {
                ctx.clearRect(0,0,w,h);
                
                // Draw floating gradient background particles
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    if(p.x < 0 || p.x > w) p.vx *= -1;
                    if(p.y < 0 || p.y > h) p.vy *= -1;
                    
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                    ctx.fill();
                });
                
                // Draw broken network connections (disconnected lines flashing)
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
                ctx.lineWidth = 1;
                for(let i=0; i<30; i+=2) {
                    if (Math.random() > 0.15) { // flashing network connection simulation
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[i+1].x, particles[i+1].y);
                        ctx.stroke();
                        
                        // Draw a red flashing broken node indicators
                        if(Math.random() > 0.96) {
                            ctx.fillStyle = 'rgba(239, 68, 68, 0.4)';
                            ctx.beginPath();
                            ctx.arc(particles[i].x, particles[i].y, 6, 0, Math.PI*2);
                            ctx.fill();
                        }
                    }
                }
                
                // Draw Floating Robot illustration
                // Robot moves up and down slowly
                robotYOffset += 0.25 * robotYDir;
                if(Math.abs(robotYOffset) > 15) robotYDir *= -1;
                
                const rx = w / 2;
                const ry = h / 2 - 160 + robotYOffset;
                
                // Draw robot glow backdrop
                const g = ctx.createRadialGradient(rx, ry + 30, 0, rx, ry + 30, 70);
                g.addColorStop(0, 'rgba(56, 189, 248, 0.2)');
                g.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.arc(rx, ry + 30, 70, 0, Math.PI*2);
                ctx.fill();
                
                // Head
                ctx.fillStyle = 'rgba(19, 19, 19, 0.8)';
                ctx.strokeStyle = 'rgba(56, 189, 248, 0.7)';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.roundRect(rx - 45, ry - 30, 90, 60, 16);
                ctx.fill();
                ctx.stroke();
                
                // Eyes (glowing blue screen lines or dots)
                ctx.fillStyle = 'rgba(56, 189, 248, 0.9)';
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(56, 189, 248, 0.8)';
                
                // Blink eye simulation
                if(Math.random() > 0.02) {
                    ctx.beginPath();
                    ctx.arc(rx - 18, ry, 6, 0, Math.PI*2);
                    ctx.arc(rx + 18, ry, 6, 0, Math.PI*2);
                    ctx.fill();
                } else {
                    // Closed blink eye lines
                    ctx.beginPath();
                    ctx.moveTo(rx - 24, ry); ctx.lineTo(rx - 12, ry);
                    ctx.moveTo(rx + 12, ry); ctx.lineTo(rx + 24, ry);
                    ctx.stroke();
                }
                ctx.shadowBlur = 0; // reset
                
                // Antennas
                ctx.strokeStyle = 'rgba(56, 189, 248, 0.7)';
                ctx.beginPath();
                ctx.moveTo(rx, ry - 30);
                ctx.lineTo(rx, ry - 45);
                ctx.stroke();
                
                ctx.fillStyle = 'rgba(168, 85, 247, 0.8)';
                ctx.beginPath();
                ctx.arc(rx, ry - 45, 4, 0, Math.PI*2);
                ctx.fill();
                
                // Body (slanted floating chassis)
                ctx.fillStyle = 'rgba(19, 19, 19, 0.8)';
                ctx.strokeStyle = 'rgba(168, 85, 247, 0.7)';
                ctx.beginPath();
                ctx.roundRect(rx - 55, ry + 40, 110, 50, 12);
                ctx.fill();
                ctx.stroke();
                
                // Connection wires (hanging down)
                ctx.strokeStyle = 'rgba(239, 68, 68, 0.4)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(rx - 30, ry + 90);
                ctx.bezierCurveTo(rx - 40, ry + 120, rx - 20, ry + 130, rx - 35, ry + 150);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(rx + 20, ry + 90);
                ctx.bezierCurveTo(rx + 10, ry + 115, rx + 30, ry + 125, rx + 15, ry + 145);
                ctx.stroke();
                
                requestAnimationFrame(draw);
            }
            
            draw();
        })();
    </script>
</body>
</html>
